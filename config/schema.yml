app:
  title: BeeUI Demo
  product: demo
  logo_text: BeeUI
  locale:
    default: en
    available:
      - en
      - ru
  theme:
    mode: dark
    primary: blue
    base: gray
    font: sans-serif
    radius: 1
    density: default
  layout:
    type: vertical
    container: xl
    sidebar:
      variant: dark
      collapsed: false
    navbar:
      enabled: false
      variant: default
      sticky: false

navigation:
  - title: Workspace
    children:
      - title: Dashboard
        path: /
        icon: dashboard
      - title: Runs
        path: /runs
        icon: runs
      - title: Reports
        icon: reports
        disabled: true

data_sources:
  demo_dashboard:
    type: demo

blocks:
  latest_run:
    type: metric_card
    title: Latest Run
    source: demo_dashboard
    value_selector: dashboard.latest_run.id
    subtitle_selector: dashboard.latest_run.status

  runtime_status:
    type: status_card
    title: Runtime
    source: demo_dashboard
    status_selector: dashboard.runtime.status
    value_selector: dashboard.runtime.value

  run_kpis:
    type: kpi_grid
    title: Session KPIs
    source: demo_dashboard
    items_selector: dashboard.kpi_items

  quick_links:
    type: links_card
    title: Quick links
    links:
      - label: Open runs
        href: /runs

  notice:
    type: alert_card
    title: Demo mode
    message: Values are resolved from controlled demo data sources for UI contract validation.
    severity: info

  summary_text:
    type: text_card
    title: Summary
    source: demo_dashboard
    text_selector: dashboard.summary.text

  completion:
    type: progress_card
    title: Bootstrap progress
    value: 72
    label: Iteration 7 in progress

  recent_runs:
    type: table_card
    title: Recent runs
    source: demo_dashboard
    rows_selector: runs
    columns:
      - key: id
        label: Run ID
      - key: status
        label: Status

pages:
  - id: dashboard
    path: /
    title: Dashboard
    subtitle: Demo operator dashboard
    blocks:
      - block: latest_run
        width: 3
      - block: runtime_status
        width: 3
      - block: completion
        width: 3
      - block: quick_links
        width: 3
      - block: run_kpis
        width: 6
      - block: notice
        width: 6
      - block: recent_runs
        width: 8
      - block: summary_text
        width: 4

  - id: runs
    path: /runs
    title: Runs
    subtitle: Placeholder page for future run overview
    blocks: []
