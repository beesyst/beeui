<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}BeeUI{% endblock %}</title>
    <link rel="stylesheet" href="{{ route_prefix }}/static/vendor/tabler/css/tabler-compatible.min.css" />
    <link rel="stylesheet" href="{{ route_prefix }}/static/css/beeui.css" />
  </head>
  <body class="layout-fluid">
    <div class="page beeui-page">
      {% include "components/sidebar.html" %}

      <div class="page-wrapper">
        {% include "components/navbar.html" %}

        <main class="page-body" aria-label="Main content">
          {% block content %}{% endblock %}
        </main>

        {% include "components/footer.html" %}
      </div>
    </div>

    <script src="{{ route_prefix }}/static/vendor/tabler/js/tabler-compatible.min.js"></script>
    <script src="{{ route_prefix }}/static/js/beeui.js"></script>
  </body>
</html>
