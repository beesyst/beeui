{% if error %}
<div class="alert alert-danger" role="alert">
  <h4 class="alert-title">Error</h4>
  <p class="mb-0">{{ error }}</p>
</div>
{% elif status != "ok" %}
<div class="alert alert-warning" role="alert">
  <h4 class="alert-title">Partial data</h4>
  <p class="mb-0">Adapter returned degraded or partial data.</p>
</div>
{% endif %}

{% if warnings %}
<div class="card mb-3">
  <div class="card-header"><h3 class="card-title">Warnings</h3></div>
  <div class="list-group list-group-flush">
    {% for warning in warnings %}
    <div class="list-group-item">
      <div class="fw-semibold">{{ warning.code }}</div>
      <div class="text-secondary">{{ warning.message }}</div>
    </div>
    {% endfor %}
  </div>
</div>
{% endif %}
