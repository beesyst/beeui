<div class="card">
  <div class="card-header">
    <h3 class="card-title">{{ block.title }}</h3>
  </div>
  <div class="card-body">
    <div class="row g-3">
      {% for item in block["items"] %}
      <div class="col-12 col-sm-6 col-lg-3">
        <div class="card h-100">
          <div class="card-body text-center">
            <div class="h1 mb-1">{{ item.value }}</div>
            <div class="subheader">{{ item.label }}</div>
            {% if item.status %}
            <span class="badge bg-secondary-lt mt-1">{{ item.status }}</span>
            {% endif %}
          </div>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</div>
