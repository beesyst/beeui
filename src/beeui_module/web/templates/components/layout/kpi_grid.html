<div class="card">
  <div class="card-header">
    <h3 class="card-title">{{ block.title }}</h3>
  </div>
  <div class="card-body">
    <div class="row g-3">
      {% for item in block["items"] %}
        <div class="{{ block.column_classes }}">
          <div class="card h-100">
            <div class="card-body text-center">
              <div class="h1 mb-1">{{ item.value }}{% if item.unit %}<small class="fs-6 text-secondary">{{ item.unit }}</small>{% endif %}</div>
              <div class="subheader">{{ item.label }}</div>
              {% if item.status %}
                <span class="badge bg-secondary-lt mt-1">{{ item.status }}</span>
              {% endif %}
              {% if item.hint %}
                <div class="text-secondary small mt-1">{{ item.hint }}</div>
              {% endif %}
            </div>
          </div>
        </div>
      {% endfor %}
    </div>
  </div>
</div>
