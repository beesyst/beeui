<div class="card">
  <div class="card-header">
    <h3 class="card-title">{{ block.title }}</h3>
  </div>
  <div class="table-responsive">
    <table class="table table-vcenter card-table">
      {% if block.columns %}
      <thead>
        <tr>
          {% for col in block.columns %}
          <th>{{ col }}</th>
          {% endfor %}
        </tr>
      </thead>
      {% endif %}
      <tbody>
        {% if block.rows %}
        {% for row in block.rows %}
        <tr>
          {% for cell in row %}
          <td>{{ cell }}</td>
          {% endfor %}
        </tr>
        {% endfor %}
        {% else %}
        <tr>
          <td colspan="{{ block.columns | length if block.columns else 1 }}" class="text-secondary">No events recorded.</td>
        </tr>
        {% endif %}
      </tbody>
    </table>
  </div>
</div>
