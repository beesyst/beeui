<div class="card">
  <div class="card-header">
    <h3 class="card-title">{{ block.title }}</h3>
  </div>
  <div class="card-body">
    <div class="row g-3">
      {% for item in block["items"] %}
      <div class="col-sm-6">
        <div class="border rounded p-3">
          <div class="subheader">{{ item.label }}</div>
          <div class="h3 mb-1">{{ item.value }}</div>
          {% if item.status %}
          <span class="badge bg-secondary-lt">{{ item.status }}</span>
          {% endif %}
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</div>
