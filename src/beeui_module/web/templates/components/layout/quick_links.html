<div class="card">
  <div class="card-header">
    <h3 class="card-title">{{ block.title }}</h3>
  </div>
  <div class="list-group list-group-flush">
    {% if block["items"] %}
      {% for item in block["items"] %}
        <div class="list-group-item">
          {% if item.href %}
            <a href="{{ url_prefix }}{{ item.href }}" class="text-reset text-decoration-none d-block">{{ item.label }}</a>
          {% else %}
            <span class="text-secondary">{{ item.label }}</span>
          {% endif %}
        </div>
      {% endfor %}
    {% else %}
      <div class="list-group-item text-secondary">No links available.</div>
    {% endif %}
  </div>
</div>
