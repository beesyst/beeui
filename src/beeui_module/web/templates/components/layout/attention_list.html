<div class="card">
  <div class="card-header">
    <h3 class="card-title">{{ block.title }}</h3>
  </div>
  <div class="list-group list-group-flush">
    {% if block["items"] %}
    {% for item in block["items"] %}
    <div class="list-group-item">
      <div class="d-flex align-items-center">
        {% if item.severity == "error" %}
        <span class="status-dot status-red me-2"></span>
        {% elif item.severity == "warning" %}
        <span class="status-dot status-yellow me-2"></span>
        {% else %}
        <span class="status-dot me-2"></span>
        {% endif %}
        <div>
          <div class="fw-semibold">{{ item.label }}</div>
          <div class="text-secondary">{{ item.message }}</div>
        </div>
      </div>
    </div>
    {% endfor %}
    {% else %}
    <div class="list-group-item text-secondary">No attention items.</div>
    {% endif %}
  </div>
</div>
