<article class="card beeui-block">
  <header class="card-header d-flex justify-content-between align-items-center">
    <h3 class="card-title mb-0">{{ block.title }}</h3>
    <span class="beeui-status-pill beeui-status-{{ block.payload['status'] }}">{{ block.payload['status'] }}</span>
  </header>
  <div class="card-body">
    {% if block.state != "normal" %}
    <div class="alert alert-secondary beeui-block-state beeui-block-state-{{ block.state }}" role="status">
      Block state: {{ block.state }}
    </div>
    {% endif %}
    {% if block.payload.get('value') %}
    <p class="beeui-metric-value mb-2">{{ block.payload['value'] }}</p>
    {% endif %}
    {% if block.payload.get('subtitle') %}
    <p class="text-secondary mb-0">{{ block.payload['subtitle'] }}</p>
    {% endif %}
  </div>
</article>
