<div class="page-header d-print-none">
  <div class="{{ layout.container_class }}">
    <div class="row g-2 align-items-center">
      <div class="col">
        <h2 class="page-title">{{ page.title }}</h2>
        {% if page.subtitle %}
        <div class="text-secondary mt-1">{{ page.subtitle }}</div>
        {% endif %}
      </div>
    </div>
  </div>
</div>
