<aside
  class="navbar navbar-vertical navbar-expand-lg beeui-sidebar"
  aria-label="Sidebar"
  id="beeui-sidebar"
>
  <div class="container-fluid">
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#beeui-sidebar-menu"
      aria-controls="beeui-sidebar-menu"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon" aria-hidden="true"></span>
    </button>
    <h1 class="navbar-brand navbar-brand-autodark">
      <a href="{{ route_prefix }}/">{{ app_title }}</a>
    </h1>
    <div class="collapse navbar-collapse" id="beeui-sidebar-menu">
      <ul class="navbar-nav pt-lg-3" role="list">
        {% for item in navigation %}
        <li class="nav-item{% if item.active %} active{% endif %}">
          <a
            class="nav-link sidebar__link{% if item.active %} is-active{% endif %}"
            href="{{ item.href }}"
          >
            <span
              class="nav-link-icon d-md-none d-lg-inline-block"
              aria-hidden="true"
            ></span>
            <span class="nav-link-title">{{ item.title }}</span>
          </a>
        </li>
        {% endfor %}
      </ul>
    </div>
  </div>
</aside>
