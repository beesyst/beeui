<article class="card beeui-block">
  <header class="card-header d-flex justify-content-between align-items-center">
    <h3 class="card-title mb-0">{{ block.title }}</h3>
    {% if block.state != "normal" %}
    <span class="badge bg-secondary-lt text-uppercase">{{ block.state }}</span>
    {% endif %}
  </header>
  <div class="card-body">
    {% if block.state != "normal" %}
    <div
      class="alert alert-secondary beeui-block-state beeui-block-state-{{ block.state }}"
      role="status"
    >
      Block state: {{ block.state }}
    </div>
    {% endif %}
    <div class="alert alert-{{ block.payload['severity'] }} mb-0" role="status">
      {{ block.payload['message'] }}
    </div>
  </div>
</article>
